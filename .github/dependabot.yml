version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]
  - package-ecosystem: npm
    directory: /web_demo/frontend
    schedule:
      interval: weekly
    groups:
      frontend-deps:
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
