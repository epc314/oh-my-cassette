name: cassette
version: 0.3.3 # x-release-please-version
manifest_version: 1
description: Cassette video-editing automation for QQ/Telegram gateway media ingestion, manifest generation, prompt preparation, and browser-driven Cassette jobs.
author: Oh My Cassette contributors
requires_env:
  - name: CASSETTE_AUTH_EMAIL
    description: Cassette account email used for scripted browser login
    url: https://trycassette.online
  - name: CASSETTE_AUTH_PASSWORD
    description: Cassette account password
    url: https://trycassette.online
    secret: true
provides_tools:
  - cassette_ingest_media
  - cassette_list_assets
  - cassette_make_prompt
  - cassette_match_bgm
  - cassette_match_exact_bgm
  - jamendo_music_matcher
  - cassette_answer_question
  - cassette_run_job
  - cassette_job_status
  - cassette_review_completion
  - cassette_cancel_job
provides_hooks:
  - pre_gateway_dispatch
  - pre_llm_call
  - post_tool_call
  - on_session_finalize
  - on_session_reset
