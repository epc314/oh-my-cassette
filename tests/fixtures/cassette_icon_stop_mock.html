<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Cassette Icon Stop Mock</title></head>
  <body>
    <input data-testid="agent-file-input" type="file" multiple>
    <div data-testid="agent-upload-status">No files selected</div>
    <section id="composer">
      <textarea placeholder="Describe what you want..."></textarea>
      <button type="button" title="Tools">tools</button>
      <button type="button" title="Settings">settings</button>
      <button type="button" title="Add">+</button>
      <button id="send-or-stop" type="button">&gt;</button>
    </section>
    <main id="status"></main>
    <script>
      let running = false;
      document.querySelector('[data-testid="agent-file-input"]').addEventListener('change', (event) => {
        document.querySelector('[data-testid="agent-upload-status"]').textContent = `${event.target.files.length} ready, 0 failed`;
      });
      document.getElementById('send-or-stop').addEventListener('click', () => {
        if (!running) {
          running = true;
          document.getElementById('send-or-stop').textContent = '■';
          document.getElementById('status').innerHTML = '<div data-testid="chat-assistant-message">Working. Task Checklist 1/5</div>';
          return;
        }
        window.stopClicked = true;
        running = false;
        document.getElementById('send-or-stop').textContent = '>';
        document.getElementById('status').innerHTML = '<div data-testid="chat-assistant-message">Stopped by user.</div>';
      });
    </script>
  </body>
</html>
