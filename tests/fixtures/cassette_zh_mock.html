<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Cassette 中文 Mock</title></head>
  <body>
    <main data-testid="agent-page">
      <section data-testid="agent-upload-strip">
        <input data-testid="agent-file-input" type="file" multiple style="display:none" />
        <button data-testid="agent-file-button" type="button">选择文件</button>
        <div data-testid="agent-upload-status">未选择文件</div>
        <button data-testid="agent-export-button" type="button" disabled title="请先添加至少一个片段再导出">导出</button>
      </section>
      <button type="button" title="新对话" aria-label="新对话">+</button>
      <textarea placeholder="描述你想要的效果…"></textarea>
      <button type="button" title="DeepSeek V4 Flash · 低">模型</button>
      <button type="submit" aria-label="发送消息" title="发送消息" disabled>发送</button>
      <div id="status"></div>
      <div id="export-status"></div>
      <div role="alertdialog" hidden>
        <button data-testid="export-confirm-submit">导出</button>
      </div>
    </main>
    <script>
      function triggerDownload(name) {
        const blob = new Blob(['fake exported video'], {type: 'video/mp4'});
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = name;
        document.body.appendChild(link);
        link.click();
        setTimeout(() => URL.revokeObjectURL(url), 100);
      }
      const uploadStatus = document.querySelector('[data-testid="agent-upload-status"]');
      const send = document.querySelector('button[type="submit"]');
      const exportButton = document.querySelector('[data-testid="agent-export-button"]');
      document.querySelector('[data-testid="agent-file-input"]').addEventListener('change', (event) => {
        uploadStatus.textContent = `${event.target.files.length} 个进行中 · 100%`;
        setTimeout(() => {
          uploadStatus.textContent = `${event.target.files.length} 个就绪，0 个失败`;
          send.disabled = false;
        }, 100);
      });
      document.querySelector('button[title*="DeepSeek"]').addEventListener('click', () => {
        const dialog = document.createElement('div');
        dialog.setAttribute('role', 'dialog');
        dialog.innerHTML = `
          <h2>AI 模型</h2>
          <button>DeepSeek V4 Flash<br />高效 MoE 推理模型</button>
          <button>Kimi K2.6<br />长上下文 Moonshot 推理模型</button>
          <h2>思考深度</h2>
          <button title="轻量推理">低</button>
          <button title="平衡">中</button>
          <button title="深度推理">高</button>
        `;
        dialog.addEventListener('click', (event) => {
          if (event.target.tagName === 'BUTTON') dialog.remove();
        });
        document.body.appendChild(dialog);
      });
      send.addEventListener('click', () => {
        document.getElementById('status').innerHTML = '<div data-testid="chat-assistant-message">任务完成，剪辑完成，可以导出。任务清单 3/3</div>';
        exportButton.disabled = false;
        exportButton.title = '导出';
      });
      exportButton.addEventListener('click', () => {
        document.querySelector('[role="alertdialog"]').hidden = false;
      });
      document.querySelector('[data-testid="export-confirm-submit"]').addEventListener('click', () => {
        document.querySelector('[role="alertdialog"]').hidden = true;
        document.getElementById('export-status').innerHTML = '<div data-testid="export-progress">导出中</div><span data-testid="export-stage">完成</span>';
        setTimeout(() => triggerDownload('zh-output.mp4'), 100);
      });
    </script>
  </body>
</html>
