<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Cassette Agent Recovery Mock</title></head>
  <body>
    <input data-testid="agent-file-input" type="file" multiple>
    <div data-testid="agent-upload-status">No files selected</div>
    <textarea placeholder="Describe your edit"></textarea>
    <button type="submit">Send</button>
    <div id="status"></div>
    <button data-testid="agent-export-button" hidden>Export</button>
    <div role="alertdialog" hidden>
      <button data-testid="export-confirm-submit">Export</button>
    </div>
    <div id="export-status"></div>
    <script>
      let sends = 0;
      function triggerDownload(name) {
        const blob = new Blob(['fake exported video'], {type: 'video/mp4'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        document.body.appendChild(a);
        a.click();
      }
      document.querySelector('[data-testid="agent-file-input"]').addEventListener('change', event => {
        document.querySelector('[data-testid="agent-upload-status"]').textContent = `${event.target.files.length} ready, 0 failed`;
      });
      document.querySelector('button[type="submit"]').addEventListener('click', () => {
        sends += 1;
        if (document.querySelector('textarea').value.includes('wait for snapshot')) {
          document.getElementById('status').innerHTML = '<div data-testid="chat-assistant-message">Thinking about the edit plan</div>';
          setTimeout(() => {
            document.getElementById('status').innerHTML = '<div data-testid="chat-assistant-message">剪辑完成，可以导出</div>';
            document.querySelector('[data-testid="agent-export-button"]').hidden = false;
          }, 1500);
          return;
        }
        if (sends === 1) {
          document.getElementById('status').innerHTML = '<div data-testid="chat-assistant-message">I cannot identify which timeline clips correspond to the requested assets.</div>';
          return;
        }
        document.getElementById('status').innerHTML = '<div data-testid="chat-assistant-message">剪辑完成，可以导出</div>';
        document.querySelector('[data-testid="agent-export-button"]').hidden = false;
      });
      document.querySelector('[data-testid="agent-export-button"]').addEventListener('click', () => {
        document.querySelector('[role="alertdialog"]').hidden = false;
      });
      document.querySelector('[data-testid="export-confirm-submit"]').addEventListener('click', () => {
        document.querySelector('[role="alertdialog"]').hidden = true;
        document.getElementById('export-status').innerHTML = '<div data-testid="export-progress">Exporting</div><span data-testid="export-stage">Complete</span>';
        setTimeout(() => triggerDownload('recovered-output.mp4'), 100);
      });
    </script>
  </body>
</html>
