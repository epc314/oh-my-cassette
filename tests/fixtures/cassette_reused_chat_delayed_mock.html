<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Cassette Reused Chat Delayed Mock</title></head>
  <body>
    <input data-testid="agent-file-input" type="file" multiple>
    <div data-testid="agent-upload-status">No files selected</div>
    <textarea placeholder="Describe what you want…"></textarea>
    <button type="submit">Send</button>
    <button data-testid="agent-export-button" hidden>Export</button>
    <div data-testid="export-confirm-dialog" role="alertdialog" hidden>
      <button data-testid="export-confirm-submit">Export</button>
    </div>
    <div id="export-status"></div>
    <main id="status"></main>
    <script>
      let sendCount = 0;
      let exportVersion = 0;
      function triggerDownload(name) {
        const blob = new Blob(['fake exported video ' + name], {type: 'video/mp4'});
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = name;
        document.body.appendChild(link);
        link.click();
      }
      document.querySelector('[data-testid="agent-file-input"]').addEventListener('change', (event) => {
        document.querySelector('[data-testid="agent-upload-status"]').textContent = `${event.target.files.length} ready, 0 failed`;
      });
      document.querySelector('button[type="submit"]').addEventListener('click', () => {
        sendCount += 1;
        if (sendCount === 1) {
          exportVersion = 1;
          document.getElementById('status').innerHTML = '<div data-testid="chat-assistant-message">剪辑完成，可以导出。FIRST</div>';
          document.querySelector('[data-testid="agent-export-button"]').hidden = false;
          return;
        }
        setTimeout(() => {
          exportVersion = 2;
          document.getElementById('status').insertAdjacentHTML('beforeend', '<div data-testid="chat-assistant-message">剪辑完成，可以导出。SECOND</div>');
        }, 800);
      });
      document.querySelector('[data-testid="agent-export-button"]').addEventListener('click', () => {
        document.querySelector('[data-testid="export-confirm-dialog"]').hidden = false;
      });
      document.querySelector('[data-testid="export-confirm-submit"]').addEventListener('click', () => {
        document.querySelector('[data-testid="export-confirm-dialog"]').hidden = true;
        document.getElementById('export-status').innerHTML = '<div data-testid="export-progress">Exporting</div><span data-testid="export-stage">Complete</span>';
        setTimeout(() => triggerDownload(exportVersion === 2 ? 'second-output.mp4' : 'first-output.mp4'), 100);
      });
    </script>
  </body>
</html>
