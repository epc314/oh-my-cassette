<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Cassette Request Failed Soft Retry Mock</title></head>
  <body>
    <input data-testid="agent-file-input" type="file" multiple>
    <div data-testid="agent-upload-status">No files selected</div>
    <button title="New Chat" id="new-chat"></button>
    <textarea placeholder="Describe your edit"></textarea>
    <button type="submit">Send</button>
    <button data-testid="agent-export-button" hidden>Export</button>
    <div role="alertdialog" hidden>
      <button data-testid="export-confirm-submit">Export</button>
    </div>
    <main id="status"></main>
    <script>
      let sends = 0;
      let uploads = 0;
      function triggerDownload(name) {
        const blob = new Blob(['fake exported video'], {type: 'video/mp4'});
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = name;
        document.body.appendChild(link);
        link.click();
      }
      document.querySelector('[data-testid="agent-file-input"]').addEventListener('change', event => {
        uploads += 1;
        window.uploads = uploads;
        document.querySelector('[data-testid="agent-upload-status"]').textContent = `${event.target.files.length} ready, 0 failed`;
      });
      document.getElementById('new-chat').addEventListener('click', () => {
        document.getElementById('status').innerHTML = '';
        document.querySelector('textarea').value = '';
      });
      document.querySelector('button[type="submit"]').addEventListener('click', () => {
        sends += 1;
        window.sends = sends;
        if (sends === 1) {
          document.getElementById('status').innerHTML = [
            '<div role="alert">Request failed. Please try again.</div>',
            '<div data-testid="chat-assistant-message">Request failed. Please try again.</div>',
            '<div>Task Checklist 1/5</div>'
          ].join('');
          return;
        }
        document.getElementById('status').innerHTML = '<div data-testid="chat-assistant-message">剪辑完成，可以导出。Task Checklist 5/5</div>';
        document.querySelector('[data-testid="agent-export-button"]').hidden = false;
      });
      document.querySelector('[data-testid="agent-export-button"]').addEventListener('click', () => {
        document.querySelector('[role="alertdialog"]').hidden = false;
      });
      document.querySelector('[data-testid="export-confirm-submit"]').addEventListener('click', () => {
        document.querySelector('[role="alertdialog"]').hidden = true;
        setTimeout(() => triggerDownload('soft-retry-output.mp4'), 100);
      });
    </script>
  </body>
</html>
