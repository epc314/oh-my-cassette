<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Cassette Missing Media Mock</title></head>
  <body>
    <textarea placeholder="Describe what you want…"></textarea>
    <button type="submit">Send</button>
    <main id="status"></main>
    <script>
      document.querySelector('button[type="submit"]').addEventListener('click', () => {
        document.getElementById('status').innerHTML = '<div data-testid="chat-assistant-message">Blocked. The workspace has zero media files in its catalog — no video, audio, or images.</div>';
      });
    </script>
  </body>
</html>
