<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Oh My Cassette Web Demo</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Oh My Cassette</h1>
          <p id="sessionLabel">Web demo</p>
        </div>
        <div class="topbar-actions">
          <div class="language-toggle" role="group" aria-label="Language">
            <button id="langZhBtn" type="button" data-lang="zh">中</button>
            <button id="langEnBtn" type="button" data-lang="en">EN</button>
          </div>
          <button id="refreshBtn" type="button" title="刷新状态" data-i18n="refresh" data-i18n-title="refreshTitle">刷新</button>
          <button id="settingsBtn" type="button" title="DeepSeek API Key" data-i18n="settings" data-i18n-title="settingsTitle">设置</button>
        </div>
      </header>

      <main class="workspace">
        <section class="chat-pane" aria-label="消息" data-i18n-aria-label="messagesAria">
          <div id="messages" class="messages"></div>
          <form id="composer" class="composer">
            <input id="fileInput" type="file" accept="video/*,image/*,audio/*" multiple hidden />
            <button id="uploadBtn" type="button" title="上传素材" data-i18n="upload" data-i18n-title="uploadTitle">上传</button>
            <textarea id="messageInput" rows="2" placeholder="发送素材后输入剪辑指令，或使用 /edit、/refine、/music、/cut" data-i18n-placeholder="messagePlaceholder"></textarea>
            <button id="sendBtn" type="submit" title="发送消息" data-i18n="send" data-i18n-title="sendTitle">发送</button>
          </form>
        </section>

        <aside class="side-pane" aria-label="状态" data-i18n-aria-label="statusAria">
          <section>
            <div class="section-title">
              <h2 data-i18n="assetsTitle">素材</h2>
              <button id="checkAssetsBtn" type="button" data-i18n="check">检查</button>
            </div>
            <div id="assets" class="asset-list"></div>
          </section>
          <section>
            <div class="section-title">
              <h2 data-i18n="jobsTitle">任务</h2>
              <button id="cutBtn" type="button" data-i18n="pause">暂停</button>
            </div>
            <div id="jobs" class="job-list"></div>
          </section>
        </aside>
      </main>
    </div>

    <dialog id="settingsDialog">
      <form method="dialog" class="settings">
        <h2 data-i18n="settingsHeading">设置</h2>
        <label>
          <span data-i18n="apiKeyLabel">DeepSeek API Key</span>
          <input id="apiKeyInput" type="password" autocomplete="off" placeholder="留空使用服务器默认 key" data-i18n-placeholder="apiKeyPlaceholder" />
        </label>
        <div class="dialog-actions">
          <button id="clearKeyBtn" type="button" data-i18n="clear">清空</button>
          <button value="cancel" data-i18n="close">关闭</button>
          <button id="saveKeyBtn" value="default" data-i18n="save">保存</button>
        </div>
      </form>
    </dialog>

    <script src="/static/app.js" defer></script>
  </body>
</html>
