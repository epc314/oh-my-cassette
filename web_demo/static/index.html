<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#07080b" />
    <title>Oh My Cassette Web Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div id="connectionBanner" class="connection-banner" role="status" aria-live="polite" hidden>
        <span id="connectionText"></span>
        <button id="retryBtn" type="button" data-i18n="retry" hidden>重试</button>
      </div>

      <header class="topbar">
        <div class="brand">
          <svg class="brand-mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="2.25" y="5.25" width="19.5" height="13.5" rx="3" stroke="currentColor" stroke-width="1.5" />
            <circle cx="8" cy="12" r="2.4" stroke="currentColor" stroke-width="1.5" />
            <circle cx="16" cy="12" r="2.4" stroke="currentColor" stroke-width="1.5" />
            <path d="M10.4 12h3.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
            <path d="M7 18.75l1.6-2.4h6.8l1.6 2.4" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
          </svg>
          <div style="min-width: 0">
            <h1>Oh My Cassette</h1>
            <p id="sessionLabel">Web demo</p>
          </div>
        </div>
        <div class="topbar-actions">
          <div class="language-toggle" role="group" aria-label="Language">
            <button id="langZhBtn" type="button" data-lang="zh">中</button>
            <button id="langEnBtn" type="button" data-lang="en">EN</button>
          </div>
          <button id="refreshBtn" type="button" title="刷新状态" data-i18n="refresh" data-i18n-title="refreshTitle">刷新</button>
          <button id="settingsBtn" type="button" title="DeepSeek API Key" data-i18n="settings" data-i18n-title="settingsTitle">设置</button>
        </div>
      </header>

      <main class="workspace">
        <section class="chat-pane" aria-label="消息" data-i18n-aria-label="messagesAria">
          <div id="messages" class="messages" role="log" aria-live="polite" aria-relevant="additions"></div>
          <div class="drop-hint" aria-hidden="true">
            <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 16V4m0 0l-4 4m4-4l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M4 16v2.5A1.5 1.5 0 005.5 20h13a1.5 1.5 0 001.5-1.5V16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
            </svg>
            <span data-i18n="dropHint">松开以上传素材</span>
          </div>
          <form id="composer" class="composer">
            <div class="command-chips" role="group" aria-label="快捷指令" data-i18n-aria-label="commandsAria">
              <button type="button" data-cmd="/edit">/edit</button>
              <button type="button" data-cmd="/refine">/refine</button>
              <button type="button" data-cmd="/music">/music</button>
              <button type="button" data-cmd="/cut">/cut</button>
            </div>
            <input id="fileInput" type="file" accept="video/*,image/*,audio/*" multiple hidden />
            <button id="uploadBtn" type="button" title="上传素材" data-i18n-title="uploadTitle">
              <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 16V4m0 0l-4 4m4-4l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M4 16v2.5A1.5 1.5 0 005.5 20h13a1.5 1.5 0 001.5-1.5V16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
              </svg>
              <span data-i18n="upload">上传</span>
            </button>
            <textarea
              id="messageInput"
              rows="2"
              placeholder="输入剪辑指令，或点上方快捷指令"
              data-i18n-placeholder="messagePlaceholder"
            ></textarea>
            <button id="sendBtn" type="submit" title="发送消息" data-i18n-title="sendTitle">
              <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4.5 12l15-7.5-4 7.5 4 7.5-15-7.5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
              </svg>
              <span data-i18n="send">发送</span>
            </button>
          </form>
        </section>

        <aside class="side-pane" aria-label="状态" data-i18n-aria-label="statusAria">
          <section>
            <div class="section-title">
              <h2 data-i18n="assetsTitle">素材</h2>
              <button id="checkAssetsBtn" type="button" data-i18n="check">检查</button>
            </div>
            <div id="assets" class="asset-list"></div>
          </section>
          <section>
            <div class="section-title">
              <h2 data-i18n="jobsTitle">任务</h2>
              <button id="cutBtn" type="button" title="暂停当前操作" data-i18n="pause" data-i18n-title="pauseTitle">暂停</button>
            </div>
            <div id="jobs" class="job-list"></div>
          </section>
        </aside>
      </main>
    </div>

    <dialog id="settingsDialog">
      <form method="dialog" class="settings">
        <h2 data-i18n="settingsHeading">设置</h2>
        <label>
          <span data-i18n="apiKeyLabel">DeepSeek API Key</span>
          <input id="apiKeyInput" type="password" autocomplete="off" placeholder="留空使用服务器默认 key" data-i18n-placeholder="apiKeyPlaceholder" />
        </label>
        <div class="dialog-actions">
          <button id="clearKeyBtn" type="button" data-i18n="clear">清空</button>
          <button value="cancel" data-i18n="close">关闭</button>
          <button id="saveKeyBtn" value="default" data-i18n="save">保存</button>
        </div>
      </form>
    </dialog>

    <script src="/static/app.js" defer></script>
  </body>
</html>
