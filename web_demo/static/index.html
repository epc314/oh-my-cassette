<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Oh My Cassette Web Demo</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Oh My Cassette</h1>
          <p id="sessionLabel">Web demo</p>
        </div>
        <div class="topbar-actions">
          <button id="refreshBtn" type="button" title="刷新状态">刷新</button>
          <button id="settingsBtn" type="button" title="DeepSeek API Key">设置</button>
        </div>
      </header>

      <main class="workspace">
        <section class="chat-pane" aria-label="消息">
          <div id="messages" class="messages"></div>
          <form id="composer" class="composer">
            <input id="fileInput" type="file" accept="video/*,image/*,audio/*" multiple hidden />
            <button id="uploadBtn" type="button" title="上传素材">上传</button>
            <textarea id="messageInput" rows="2" placeholder="发送素材后输入剪辑指令，或使用 /edit、/refine、/music、/cut"></textarea>
            <button id="sendBtn" type="submit" title="发送消息">发送</button>
          </form>
        </section>

        <aside class="side-pane" aria-label="状态">
          <section>
            <div class="section-title">
              <h2>素材</h2>
              <button id="checkAssetsBtn" type="button">检查</button>
            </div>
            <div id="assets" class="asset-list"></div>
          </section>
          <section>
            <div class="section-title">
              <h2>任务</h2>
              <button id="cutBtn" type="button">暂停</button>
            </div>
            <div id="jobs" class="job-list"></div>
          </section>
        </aside>
      </main>
    </div>

    <dialog id="settingsDialog">
      <form method="dialog" class="settings">
        <h2>设置</h2>
        <label>
          DeepSeek API Key
          <input id="apiKeyInput" type="password" autocomplete="off" placeholder="留空使用服务器默认 key" />
        </label>
        <div class="dialog-actions">
          <button id="clearKeyBtn" type="button">清空</button>
          <button value="cancel">关闭</button>
          <button id="saveKeyBtn" value="default">保存</button>
        </div>
      </form>
    </dialog>

    <script src="/static/app.js" defer></script>
  </body>
</html>
